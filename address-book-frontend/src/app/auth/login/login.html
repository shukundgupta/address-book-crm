<div class="login-wrapper">

  <!-- Animated Background -->
  <div class="bg"></div>

  <!-- Center Card -->
  <div class="login-card">

  <!-- APP LOGO -->
  <img [src]="logoUrl"
       class="logo"
       (error)="logoUrl='assets/app-logo.png'" />

  <h2>Welcome Back</h2>
  <p class="subtitle">Login to your CRM</p>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
    />

    <select [(ngModel)]="company_id" (change)="onCompanyChange()">
      <option value="">Select Company</option>
      <option value="1">Komal Chemiequip Pvt. Ltd.</option>
      <option value="2">Arnav Agencies</option>
    </select>

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
    />

    <div class="remember">
      <label>
        <input type="checkbox" [(ngModel)]="rememberMe" />
        <span>Remember me</span>
      </label>
    </div>

    <button (click)="login()" [disabled]="loading">

      <span *ngIf="!loading">Login</span>
      <span *ngIf="loading" class="spinner"></span>

    </button>

    <div class="auth-switch">
      Don't have an account?
      <a routerLink="/signup">Create Account</a>
    </div>

  </div>

</div>
